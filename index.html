<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback Survey</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1 id="title">User Feedback Survey</h1>
    <p id="description">Please fill out the following survey to help us improve our services. All responses are anonymous and confidential.</p>
    
    <form id="survey-form">
        
        <label id="name-label" for="name">Full Name:</label>
        <input type="text" id="name" name="name" required placeholder="John Doe" aria-label="Full Name">
        
        
        <label id="email-label" for="email">Email Address:</label>
        <input type="email" id="email" name="email" required placeholder="example@mail.com" aria-label="Email Address">
        
        
        <label id="number-label" for="number">Age:</label>
        <input type="number" id="number" name="age" min="0" max="120" required placeholder="Your Age" aria-label="Age">
        
       
        <label for="dropdown">Choose your option:</label>
        <select id="dropdown" name="options" required>
            <option value="" disabled selected>Select an option</option>
            <option value="option1">Option 1</option>
            <option value="option2">Option 2</option>
        </select>
        

        <fieldset>
            <legend>How would you rate our service?</legend>
            <input type="radio" id="rating1" name="serviceRating" value="1" required>
            <label for="rating1">1</label>
            <input type="radio" id="rating2" name="serviceRating" value="2" required>
            <label for="rating2">2</label>
        </fieldset>
        
        
        <fieldset>
            <legend>What features do you like?</legend>
            <input type="checkbox" id="feature1" name="features" value="feature1">
            <label for="feature1">Feature 1</label>
            <input type="checkbox" id="feature2" name="features" value="feature2">
            <label for="feature2">Feature 2</label>
        </fieldset>
        
        
        <label for="feedback">Additional Comments:</label>
        <textarea id="feedback" name="feedback" placeholder="Your feedback here..." rows="4"></textarea>
        

        <button type="submit" id="submit">Submit</button>
    </form>
</div>

</body>
</html>
